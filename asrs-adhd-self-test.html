<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>成人ADHD自评量表 / Adult ADHD Self-Report Scale (ASRS v1.1)</title>
<meta name="description" content="基于世界卫生组织与哈佛医学院联合开发的成人ADHD自评量表（ASRS v1.1）6题筛查版改编，中英双语，非诊断用途，单文件离线可用。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#fdfcf9;
    --bg-1:#f7f3ea;
    --bg-2:#f0ead9;
    --mist:#f5f1e6;
    --mist-strong:#ece4d0;
    --line:#e0d6bd;
    --line-soft:#ece4d3;
    --blue-100:#e3ebf3;
    --blue-300:#8ba9c9;
    --blue-500:#3d5f8a;
    --blue-700:#1f3a5f;
    --gold-100:#f6ecd2;
    --gold-300:#e8c878;
    --gold-500:#c9932b;
    --gold-700:#96721a;
    --red-100:#f3e0e1;
    --red-300:#dba3ab;
    --red-500:#b8394a;
    --red-700:#8b2635;
    --ink-900:#26221b;
    --ink-700:#4a4436;
    --ink-500:#776f5c;
    --ink-300:#a89f89;
    --shadow-card: 0 1px 2px rgba(38,34,27,.06), 0 18px 40px -18px rgba(31,58,95,.28);
    --shadow-btn: 0 8px 20px -8px rgba(31,58,95,.4);
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --serif: "Noto Serif SC", "Songti SC", serif;
    --sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    color:#26221b;
    background: linear-gradient(160deg, #dce7f4 0%, #f3ecda 32%, #f8ecd8 52%, #f5e0d8 72%, #f0d9dc 100%);
    background-attachment: fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.65;
  }
  ::selection{background:#e8c878;color:#26221b;}
  a{color:#1f3a5f;}

  .app{ max-width:640px; margin:0 auto; padding:28px 20px 60px; position:relative; z-index:1; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; font-size:13px; color:#776f5c; }
  .lang-switch{
    display:inline-flex; background:#f5f1e6; border:1px solid #ece4d3; border-radius:99px;
    padding:3px; gap:2px; font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px;
  }
  .lang-switch button{
    appearance:none; border:none; background:transparent; cursor:pointer; padding:5px 12px;
    border-radius:99px; color:#776f5c; font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; font-weight:600;
    transition:background .15s ease, color .15s ease;
  }
  .lang-switch button.active{ background:#1f3a5f; color:#fff; }
  .badge-time{
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; color:#776f5c;
    background:#f5f1e6; border:1px solid #ece4d3; padding:4px 11px; border-radius:99px;
  }

  .card{
    background:#fdfcf9; border:1px solid #ece4d3; border-radius:22px;
    box-shadow:0 1px 2px rgba(38,34,27,.06), 0 18px 40px -18px rgba(31,58,95,.28); padding:34px 30px; position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg, #3d5f8a, #c9932b, #b8394a); opacity:.85;
  }

  .screen{ display:none; animation: rise .5s ease both; }
  .screen.active{ display:block; }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .screen{animation:none;} }

  .intro-plain{ padding:44px 6px 8px; }

  .eyebrow{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#1f3a5f; margin:0 0 10px; text-align:center; }
  h1.title{
    font-family:"Noto Serif SC", "Songti SC", serif; font-weight:700; font-size:clamp(19px, 6vw, 25px); line-height:1.32;
    color:#26221b; margin:0 0 10px; letter-spacing:-.01em; text-align:center;
  }
  h1.title.nowrap{ white-space:nowrap; }
  .tagline{
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12.5px; letter-spacing:.04em;
    color:#1f3a5f; margin:0 0 16px; text-align:center;
  }
  .req-line{ color:#4a4436; font-size:13.5px; margin:0 0 26px; text-align:center; letter-spacing:.01em; }

  .disclaimer-inline{
    font-size:12.5px; color:#776f5c; line-height:1.8; margin:22px 0 0;
    padding-top:18px; border-top:1px solid #ece4d3; text-align:center;
  }
  .disclaimer-inline b{ color:#4a4436; }

  .btn{
    appearance:none; border:none; cursor:pointer; font-family:"Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size:15px; font-weight:600; border-radius:99px; padding:14px 26px;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn:focus-visible{ outline:3px solid #e8c878; outline-offset:2px; }
  .btn-primary{
    background:linear-gradient(135deg, #3d5f8a, #1f3a5f 60%, #8b2635);
    color:#fff; width:100%;
    box-shadow:0 1px 0 rgba(255,255,255,.18) inset, 0 -2px 8px rgba(0,0,0,.14) inset, 0 8px 20px -8px rgba(31,58,95,.4);
  }
  .btn-primary:hover{ filter:brightness(1.06); }
  .btn-primary:active{ box-shadow:0 2px 10px rgba(0,0,0,.22) inset, 0 4px 10px -6px rgba(31,58,95,.4); }
  .btn-ghost{ background:#fdfcf9; color:#1f3a5f; border:1px solid #e0d6bd; }
  .btn-ghost:hover{ background:#f5f1e6; }
  .btn-soft{ background:#f5f1e6; color:#4a4436; border:1px solid #ece4d3; }
  .btn-soft:hover{ background:#ece4d0; }
  .btn[disabled]{ opacity:.4; cursor:not-allowed; }
  .btn-row{ display:flex; gap:10px; margin-top:6px; }
  .btn-row .btn{ flex:1; }

  .progress-wrap{ margin-bottom:26px; }
  .progress-meta{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .progress-meta .section-label{ font-size:12.5px; color:#1f3a5f; font-weight:600; letter-spacing:.02em; }
  .progress-meta .count{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12.5px; color:#776f5c; }
  .tide{ position:relative; height:7px; border-radius:99px; background:#ece4d0; overflow:hidden; }
  .tide-fill{ position:absolute; inset:0; width:0%; border-radius:99px; background:linear-gradient(90deg, #3d5f8a, #c9932b); transition:width .4s cubic-bezier(.4,0,.2,1); }

  .q-cluster-tag{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:11px; color:#a89f89; letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; }
  .q-text{ font-family:"Noto Serif SC", "Songti SC", serif; font-size:19px; line-height:1.6; color:#26221b; font-weight:600; margin:0 0 26px; min-height:64px; }

  .opt-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
  .opt{
    position:relative; display:flex; align-items:center; gap:12px;
    border:1.5px solid #e0d6bd; border-radius:14px; padding:14px 16px; cursor:pointer;
    background:#fdfcf9; transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
    box-shadow:0 1px 2px rgba(38,34,27,.05);
  }
  .opt:hover{ border-color:#3d5f8a; background:#e3ebf3; }
  .opt.selected{
    border-color:#1f3a5f; background:#e3ebf3;
    box-shadow:0 4px 12px -4px rgba(31,58,95,.35);
  }
  .opt .radio{
    width:20px; height:20px; border-radius:50%; border:2px solid #e0d6bd; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; transition:border-color .15s ease;
  }
  .opt .radio::after{ content:""; width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,#3d5f8a,#1f3a5f); transform:scale(0); transition:transform .15s ease; }
  .opt.selected .radio{ border-color:#1f3a5f; }
  .opt.selected .radio::after{ transform:scale(1); }
  .opt .opt-label{ font-size:15px; color:#26221b; font-weight:500; }

  #result-capture{ padding:2px; }
  .result-hero{ display:flex; align-items:center; gap:22px; margin-bottom:24px; flex-wrap:wrap; }
  .ring-wrap{ position:relative; width:118px; height:118px; flex:0 0 auto; }
  .ring-wrap svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .ring-track{ fill:none; stroke:#ece4d0; stroke-width:10; }
  .ring-fill{ fill:none; stroke:#1f3a5f; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
  .ring-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-center .score-num{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:24px; font-weight:600; color:#26221b; }
  .ring-center .score-den{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:10.5px; color:#776f5c; }

  .result-headline{ flex:1 1 200px; min-width:180px; }
  .result-tag{ display:inline-block; font-size:12px; font-weight:600; padding:4px 12px; border-radius:99px; margin-bottom:8px; letter-spacing:.02em; }
  .tag-neg{ background:#e3ebf3; color:#1f3a5f; }
  .tag-pos{ background:#f3e0e1; color:#8b2635; }
  .result-headline h2{ font-family:"Noto Serif SC", "Songti SC", serif; font-size:19px; margin:0 0 6px; color:#26221b; line-height:1.4; }
  .result-headline p{ margin:0; font-size:13px; color:#776f5c; }

  .section-title{ font-family:"Noto Serif SC", "Songti SC", serif; font-size:15px; font-weight:700; color:#1f3a5f; margin:28px 0 14px; display:flex; align-items:center; gap:8px; }
  .section-title::after{ content:""; flex:1; height:1px; background:#ece4d3; }

  .rec-list{ margin:0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:12px; }
  .rec-list li{
    display:flex; gap:12px; font-size:13.5px; color:#4a4436; align-items:flex-start;
    background:#fdfcf9; border:1px solid #ece4d3; border-radius:14px; padding:13px 15px;
  }
  .rec-list li b{ color:#26221b; }
  .rec-list li .num{
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; color:#1f3a5f; font-weight:700; flex:0 0 auto;
    width:22px; height:22px; border-radius:50%; background:#e3ebf3; display:flex; align-items:center; justify-content:center;
  }

  .disclaimer{ font-size:12px; color:#776f5c; background:#f7f3ea; border:1px dashed #e0d6bd; border-radius:14px; padding:14px 16px; margin-top:24px; line-height:1.75; }
  .disclaimer b{ color:#4a4436; }

  .action-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:26px; }
  .action-grid .btn{ width:100%; font-size:14px; padding:13px 14px; }

  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(10px);
    background:#26221b; color:#fff; font-size:13px; padding:10px 18px; border-radius:99px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:50;
    box-shadow:0 10px 30px -10px rgba(0,0,0,.4);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  footer.foot{ text-align:center; margin-top:30px; font-size:11.5px; color:#a89f89; }

  @media (max-width:420px){
    .card{ padding:26px 18px; }
    .intro-plain{ padding:30px 4px 8px; }
    .action-grid{ grid-template-columns:1fr 1fr; }
  }

  .qr-overlay{
    position:fixed; inset:0; z-index:80; display:none;
    align-items:center; justify-content:center;
    background:rgba(38,34,27,.5); backdrop-filter:blur(2px);
    padding:20px;
  }
  .qr-overlay.show{ display:flex; }
  .qr-modal{
    position:relative; background:#fff; border-radius:22px;
    padding:30px 26px 26px; max-width:320px; width:100%; text-align:center;
    box-shadow:0 30px 60px -20px rgba(38,34,27,.4);
    animation: qr-pop .25s cubic-bezier(.2,.9,.3,1.2) both;
  }
  @keyframes qr-pop{ from{opacity:0; transform:scale(.92) translateY(6px);} to{opacity:1; transform:scale(1) translateY(0);} }
  .qr-close{ position:absolute; top:10px; right:12px; border:none; background:none; cursor:pointer; font-size:22px; line-height:1; color:#a89f89; padding:6px; }
  .qr-close:hover{ color:#4a4436; }
  .qr-eyebrow{ font-family:"Noto Serif SC", "Songti SC", serif; font-weight:700; font-size:16px; color:#26221b; margin:0 0 16px; }
  .qr-img{ width:100%; max-width:220px; height:auto; border-radius:12px; border:1px solid #ece4d3; margin-bottom:14px; }
  .qr-placeholder{
    width:220px; height:220px; max-width:100%; margin:0 auto 14px; border-radius:12px;
    border:1.5px dashed #e0d6bd; background:#f5f1e6; display:flex; align-items:center; justify-content:center;
    font-size:12.5px; color:#776f5c; padding:16px; text-align:center; line-height:1.6;
  }
  .qr-hint{ font-size:12.5px; color:#776f5c; margin:0 0 12px; line-height:1.7; }
  .qr-fallback{ display:inline-block; font-size:12.5px; color:#1f3a5f; text-decoration:underline; }
  .qr-academic-note{ margin:14px 0 0; padding-top:12px; border-top:1px dashed #e0d6bd; font-size:11.5px; color:#a89f89; line-height:1.7; }
  .share-url-input{
    width:100%; padding:11px 12px; border:1.5px solid #e0d6bd; border-radius:10px;
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:12px; color:#26221b;
    margin-bottom:12px; background:#f7f3ea;
  }
</style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="lang-switch" id="lang-switch">
      <button data-lang="zh" id="lang-btn-zh">中文</button>
      <button data-lang="en" id="lang-btn-en">EN</button>
    </div>
    <div class="badge-time" id="topbar-progress"></div>
  </div>

  <!-- ============ SCREEN 1: INTRO ============ -->
  <section class="screen active intro-plain" id="screen-intro">
    <h1 class="title" id="intro-title" data-i18n="title_intro"></h1>
    <p class="tagline" data-i18n="tagline_intro"></p>
    <p class="req-line" data-i18n="req_line"></p>

    <button class="btn btn-primary" id="btn-start" data-i18n="btn_start"></button>

    <p class="disclaimer-inline" data-i18n-html="disclaimer_intro"></p>
  </section>

  <!-- ============ SCREEN 2: QUIZ ============ -->
  <section class="screen card" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="section-label" id="section-label"></span>
        <span class="count" id="q-counter"></span>
      </div>
      <div class="tide"><div class="tide-fill" id="tide-fill"></div></div>
    </div>

    <p class="q-cluster-tag" id="q-cluster-tag"></p>
    <p class="q-text" id="q-text"></p>

    <div class="opt-list" id="opt-list"></div>

    <div class="btn-row">
      <button class="btn btn-soft" id="btn-prev"></button>
      <button class="btn btn-primary" id="btn-next" disabled></button>
    </div>
  </section>

  <!-- ============ SCREEN 3: RESULT ============ -->
  <section class="screen card" id="screen-result">
    <div id="result-capture">
      <p class="eyebrow" data-i18n="eyebrow_result"></p>

      <div class="result-hero">
        <div class="ring-wrap">
          <svg viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="50"></circle>
            <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="314"></circle>
          </svg>
          <div class="ring-center">
            <span class="score-num" id="score-num">0</span>
            <span class="score-den" id="score-den">/ 6</span>
          </div>
        </div>
        <div class="result-headline">
          <span class="result-tag tag-neg" id="result-tag"></span>
          <h2 id="result-title"></h2>
          <p id="result-sub"></p>
        </div>
      </div>

      <p style="font-size:13.5px;color:#4a4436;margin:0 0 4px;" id="result-desc"></p>

      <div class="section-title" data-i18n="section_rec"></div>
      <ul class="rec-list" id="rec-list"></ul>
    </div>

    <div class="action-grid">
      <button class="btn btn-soft" id="btn-save"></button>
      <button class="btn btn-soft" id="btn-retake"></button>
      <button class="btn btn-soft" id="btn-share"></button>
      <button class="btn btn-ghost" id="btn-back"></button>
    </div>
  </section>

  <footer class="foot" data-i18n="footer_note"></footer>
</div>

<div class="toast" id="toast"></div>

<div class="qr-overlay" id="qr-overlay" role="dialog" aria-modal="true" aria-labelledby="qr-title">
  <div class="qr-modal">
    <button class="qr-close" id="qr-close" aria-label="Close">&times;</button>
    <p class="qr-eyebrow" id="qr-title" data-i18n="qr_title"></p>
    <img class="qr-img" id="qr-img" style="display:none;" alt="微信公众号二维码 / WeChat Official Account QR Code">
    <div class="qr-placeholder" id="qr-placeholder" style="display:none;"></div>
    <p class="qr-hint" data-i18n="qr_hint"></p>
    <p class="qr-hint" data-i18n-html="qr_search_hint"></p>
    <a class="qr-fallback" id="qr-fallback-link" target="_blank" rel="noopener" data-i18n="qr_fallback"></a>
    <p class="qr-academic-note" data-i18n="qr_academic_note"></p>
  </div>
</div>

<div class="qr-overlay" id="share-overlay" role="dialog" aria-modal="true" aria-labelledby="share-title">
  <div class="qr-modal">
    <button class="qr-close" id="share-close" aria-label="Close">&times;</button>
    <p class="qr-eyebrow" id="share-title" data-i18n="share_title"></p>
    <input type="text" id="share-url-input" class="share-url-input" readonly>
    <button class="btn btn-primary" id="share-copy-btn" data-i18n="share_copy_btn" style="width:100%; margin-bottom:10px;"></button>
    <p class="qr-hint" data-i18n="share_hint"></p>
  </div>
</div>

        wrap.className = 'opt';
        if(state.answers[q.id] === v) wrap.classList.add('selected');
        wrap.innerHTML = '<span class="radio"></span><span class="opt-label">'+t('likert_'+v)+'</span>';
        wrap.addEventListener('click', function(){
          state.answers[q.id] = v;
          renderQuestion();
          setTimeout(function(){ goNextAuto(); }, 220);
        });
        optListEl.appendChild(wrap);
      })(v);
    }

    btnPrev.disabled = (state.idx === 0);
    btnNext.disabled = (state.answers[q.id] === undefined);
    btnNext.textContent = (state.idx === QUESTIONS.length - 1) ? t('btn_next_last') : t('btn_next');
  }

  function goNextAuto(){
    if(state.answers[QUESTIONS[state.idx].id] === undefined) return;
    if(state.idx < QUESTIONS.length - 1){
      state.idx++;
      renderQuestion();
    } else {
      computeAndShowResult();
    }
  }

  btnNext.addEventListener('click', function(){
    if(state.answers[QUESTIONS[state.idx].id] === undefined) return;
    if(state.idx < QUESTIONS.length - 1){
      state.idx++;
      renderQuestion();
    } else {
      computeAndShowResult();
    }
  });
  btnPrev.addEventListener('click', function(){
    if(state.idx > 0){ state.idx--; renderQuestion(); }
  });

  document.getElementById('btn-start').addEventListener('click', function(){
    state.idx = 0;
    renderQuestion();
    showScreen(elQuiz);
  });

  function score(id){ return state.answers[id] === undefined ? 0 : state.answers[id]; }

  function computeAndShowResult(){
    var shadedCount = 0;

    QUESTIONS.forEach(function(q){
      var v = score(q.id);
      if(v >= q.threshold){
        shadedCount++;
      }
    });

    var isPositive = shadedCount >= 4;

    var circumference = 2*Math.PI*50;
    var pct = Math.min(1, shadedCount/6);
    var ringFill = document.getElementById('ring-fill');
    ringFill.setAttribute('stroke-dasharray', circumference.toFixed(1));
    requestAnimationFrame(function(){
      ringFill.style.strokeDashoffset = (circumference*(1-pct)).toFixed(1);
    });
    document.getElementById('score-num').textContent = shadedCount;
    document.getElementById('score-den').textContent = (LANG==='zh' ? '/ 6 项达阈值' : '/ 6 shaded');

    var tagEl = document.getElementById('result-tag');
    var TAG = isPositive
      ? {zh:"筛查结果：阳性（4项及以上）", en:"Result: Positive (4+ items)"}
      : {zh:"筛查结果：阴性（未达4项）", en:"Result: Negative (fewer than 4 items)"};
    var TITLE = isPositive
      ? {zh:"ADHD 可能性：较高", en:"ADHD Likelihood: Higher"}
      : {zh:"ADHD 可能性：较低", en:"ADHD Likelihood: Lower"};
    var DESC = isPositive
      ? {zh:"在阴影区域打勾的条目共 "+shadedCount+" 个（满分6个，4个及以上即为阳性）。这提示你的症状可能与成人ADHD相符，值得认真考虑找专业医生谈一谈、做一次系统评估。这不等于确诊。",
             en:"The number of items falling in the shaded area is "+shadedCount+" out of 6 (4 or more is a positive screen). This suggests your symptoms may be consistent with Adult ADHD — it may be beneficial to talk with your healthcare provider about a full evaluation. This is not a diagnosis."}
      : {zh:"在阴影区域打勾的条目共 "+shadedCount+" 个（满分6个，未达到4个的阳性标准）。这不代表你的困扰不值得被重视，只是说明单从这份量表来看，不太支持ADHD可能性较高这一判断。压力、睡眠不足或情绪低落也可能让个别条目得分偏高，值得留意。",
             en:"The number of items falling in the shaded area is "+shadedCount+" out of 6 (below the positive-screen cutoff of 4). This doesn't mean your difficulties aren't worth taking seriously — it just means this scale alone doesn't strongly support a high likelihood of ADHD. Stress, poor sleep, or low mood can also raise individual item scores, and that's worth paying attention to as well."};

    tagEl.className = 'result-tag ' + (isPositive ? 'tag-pos' : 'tag-neg');
    tagEl.textContent = TAG[LANG];
    document.getElementById('result-title').textContent = TITLE[LANG];
    document.getElementById('result-sub').textContent = "";
    document.getElementById('result-desc').textContent = DESC[LANG];

    renderRecommendations(isPositive);

    document.getElementById('topbar-progress').textContent = t('progress_of');
    state.resultComputed = true;
    showScreen(elResult);
  }

  /* ============================================================
     建议：按筛查阴性/阳性分层，具体可操作
  ============================================================ */
  function renderRecommendations(isPositive){
    var recList = document.getElementById('rec-list');
    var recs = [];

    if(isPositive){
      recs = [
        {zh:"<b>预约一次系统评估：</b>找精神科医生或有成人ADHD评估经验的临床心理师，系统评估通常包括结构化访谈、童年期症状回溯（ADHD要求症状在12岁前已出现）、并排除焦虑/抑郁/睡眠障碍等其他可能解释症状的原因。",
         en:"<b>Book a systematic evaluation:</b> find a psychiatrist or clinical psychologist experienced in adult ADHD assessment. A full evaluation typically includes a structured interview, a look back at childhood symptoms (ADHD requires symptoms present before age 12), and ruling out anxiety, depression, sleep disorders, and other conditions that could explain the symptoms."},
        {zh:"<b>把这份结果带去就诊：</b>可以直接保存本页PDF，附上你自己回忆的「从小到大在哪些场景最容易出现这些困扰」的具体例子，能帮助医生更快建立完整图像，减少复诊次数。",
         en:"<b>Bring this result to your appointment:</b> save this page as a PDF and add your own specific examples of when these difficulties have shown up across your life — this helps a clinician build a fuller picture faster and can reduce the number of visits needed."},
        {zh:"<b>评估前可以先做的记录：</b>连续1-2周，记下让你特别容易「掉链子」的具体场景（比如开会走神、忘记回复消息、任务拖到最后一刻），越具体的例子对评估越有帮助。",
         en:"<b>Track before your evaluation:</b> for 1-2 weeks, note the specific situations where things tend to slip (zoning out in meetings, forgetting to reply to messages, tasks left to the last minute) — the more concrete the examples, the more useful they'll be."},
        {zh:"<b>在等待评估期间，可以先用外部系统减轻执行功能负担：</b>比如把任务写在看得见的地方而不是「记在脑子里」、用计时器把大任务切成25分钟一段（番茄工作法），这些不能替代评估，但能缓解眼前的困扰。",
         en:"<b>While waiting for your evaluation, external systems can ease the load:</b> writing tasks down somewhere visible instead of relying on memory, or breaking large tasks into 25-minute chunks with a timer (Pomodoro technique) — these don't replace an evaluation, but can ease day-to-day friction in the meantime."}
      ];
    } else {
      recs = [
        {zh:"<b>如果困扰持续存在，仍然值得被重视：</b>这份量表的阴性结果不代表你的感受不重要——如果注意力或条理性方面的困扰持续影响生活，仍然可以和医生聊聊，只是ADHD可能不是最主要的解释方向。",
         en:"<b>If the difficulties persist, they're still worth taking seriously:</b> a negative screen doesn't mean your experience doesn't matter — if attention or organization struggles are still affecting your life, it's still worth discussing with a doctor, just that ADHD may not be the primary explanation."},
        {zh:"<b>先排查几个常见的「干扰项」：</b>连续记录1周的睡眠时长和主观压力水平（1-10分），如果最近睡眠明显不足或压力骤增，这份结果可能被暂时性因素放大或掩盖，建议状态平稳后再重新评估一次。",
         en:"<b>Rule out a few common confounders first:</b> track your sleep duration and subjective stress level (1-10) for a week. If you've had notably poor sleep or a recent spike in stress, this result may be temporarily skewed — consider retaking it once things settle."},
        {zh:"<b>通用的注意力管理技巧，无论是否有ADHD都适用：</b>比如把手机放在另一个房间再开始专注工作、用清单代替「记在脑子里」、每完成一个子任务就打勾获得即时反馈感。",
         en:"<b>General attention-management techniques that help regardless of ADHD status:</b> putting your phone in another room before focused work, using checklists instead of relying on memory, and checking off sub-tasks for a small hit of immediate feedback."}
      ];
    }

    recList.innerHTML = '';
    recs.forEach(function(item, i){
      var li = document.createElement('li');
      li.innerHTML = '<span class="num">'+(i+1)+'</span><span>'+item[LANG]+'</span>';
      recList.appendChild(li);
    });
  }

  function showToast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 2200);
  }

  document.getElementById('btn-retake').addEventListener('click', function(){
    state.answers = {};
    state.idx = 0;
    state.resultComputed = false;
    renderQuestion();
    showScreen(elIntro);
  });

  /* ============================================================
     极简 PDF 生成器：把一张 JPEG 图片包成单页 PDF。
     不依赖任何第三方 PDF 库。
  ============================================================ */
  function dataUrlToUint8Array(dataUrl){
    var base64 = dataUrl.split(',')[1];
    var binary = atob(base64);
    var bytes = new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++){ bytes[i] = binary.charCodeAt(i); }
    return bytes;
  }

  function buildSingleImagePdf(jpegBytes, pxWidth, pxHeight){
    var dpi = 96;
    var ptWidth = pxWidth * 72 / dpi;
    var ptHeight = pxHeight * 72 / dpi;

    var enc = new TextEncoder();
    var chunks = [];
    var totalLen = 0;
    var offsets = [];

    function pushText(str){ var b = enc.encode(str); chunks.push(b); totalLen += b.length; }
    function pushBytes(b){ chunks.push(b); totalLen += b.length; }
    function markOffset(){ offsets.push(totalLen); }

    pushText("%PDF-1.4\n");

    markOffset();
    pushText("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");

    markOffset();
    pushText("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n");

    markOffset();
    pushText("3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 " + ptWidth.toFixed(2) + " " + ptHeight.toFixed(2) + "] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>\nendobj\n");

    var contentStr = "q " + ptWidth.toFixed(2) + " 0 0 " + ptHeight.toFixed(2) + " 0 0 cm /Im0 Do Q";
    markOffset();
    pushText("4 0 obj\n<< /Length " + contentStr.length + " >>\nstream\n" + contentStr + "\nendstream\nendobj\n");

    markOffset();
    pushText("5 0 obj\n<< /Type /XObject /Subtype /Image /Width " + pxWidth + " /Height " + pxHeight + " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length " + jpegBytes.length + " >>\nstream\n");
    pushBytes(jpegBytes);
    pushText("\nendstream\nendobj\n");

    var xrefOffset = totalLen;
    var entries = ["0000000000 65535 f "];
    offsets.forEach(function(off){
      entries.push(String(off).padStart(10,'0') + " 00000 n ");
    });
    pushText("xref\n0 " + (offsets.length+1) + "\n" + entries.join("\n") + "\n");
    pushText("trailer\n<< /Size " + (offsets.length+1) + " /Root 1 0 R >>\nstartxref\n" + xrefOffset + "\n%%EOF");

    var out = new Uint8Array(totalLen);
    var pos = 0;
    chunks.forEach(function(c){ out.set(c, pos); pos += c.length; });
    return out;
  }

  document.getElementById('btn-save').addEventListener('click', function(){
    var target = document.getElementById('result-capture');
    var btn = document.getElementById('btn-save');
    var original = btn.textContent;
    if(typeof html2canvas === 'undefined'){
      showToast(t('toast_save_fail'));
      return;
    }
    btn.textContent = t('saving');
    btn.disabled = true;
    html2canvas(target, {backgroundColor:'#ffffff', scale: Math.min(2, window.devicePixelRatio || 2), useCORS:true, allowTaint:true})
      .then(function(canvas){
        var jpegDataUrl = canvas.toDataURL('image/jpeg', 0.92);
        var jpegBytes = dataUrlToUint8Array(jpegDataUrl);
        var pdfBytes = buildSingleImagePdf(jpegBytes, canvas.width, canvas.height);
        var blob = new Blob([pdfBytes], {type:'application/pdf'});
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.download = (LANG==='zh' ? 'ADHD自评结果.pdf' : 'ADHD-assessment-result.pdf');
        link.href = url;
        link.click();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
        btn.textContent = original;
        btn.disabled = false;
      })
      .catch(function(err){
        console.error('save-as-PDF error:', err);
        showToast(t('toast_save_fail'));
        btn.textContent = original;
        btn.disabled = false;
      });
  });

  /* ---------- 分享测评链接：多层回退 ---------- */
  var shareOverlay = document.getElementById('share-overlay');
  var shareUrlInput = document.getElementById('share-url-input');

  function execCommandCopy(text){
    try{
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    }catch(e){ return false; }
  }

  function openShareModal(url){
    shareUrlInput.value = url;
    shareOverlay.classList.add('show');
    setTimeout(function(){ shareUrlInput.focus(); shareUrlInput.select(); }, 50);
  }
  function closeShareModal(){ shareOverlay.classList.remove('show'); }

  document.getElementById('btn-share').addEventListener('click', function(){
    var url = window.location.href;
    var text = LANG==='zh'
      ? '我刚做了一份基于WHO与哈佛医学院联合开发的ASRS成人ADHD自评量表，你也可以来了解一下自己的状态：'
      : "I just took a self-assessment based on the WHO/Harvard ASRS Adult ADHD screener — you can check your own state too:";

    if(navigator.share){
      navigator.share({title: LANG==='zh' ? '成人ADHD自评' : 'Adult ADHD Self-Assessment', text:text, url:url})
        .catch(function(){ /* user cancelled — not an error */ });
      return;
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text + ' ' + url).then(function(){
        showToast(t('toast_copied'));
      }).catch(function(){
        if(execCommandCopy(text + ' ' + url)){ showToast(t('toast_copied')); }
        else { openShareModal(url); }
      });
      return;
    }
    if(execCommandCopy(text + ' ' + url)){
      showToast(t('toast_copied'));
    } else {
      openShareModal(url);
    }
  });

  document.getElementById('share-close').addEventListener('click', closeShareModal);
  shareOverlay.addEventListener('click', function(e){ if(e.target === shareOverlay) closeShareModal(); });
  document.getElementById('share-copy-btn').addEventListener('click', function(){
    shareUrlInput.select();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(shareUrlInput.value).then(function(){ showToast(t('toast_copied')); }).catch(function(){
        if(execCommandCopy(shareUrlInput.value)) showToast(t('toast_copied'));
      });
    } else if(execCommandCopy(shareUrlInput.value)){
      showToast(t('toast_copied'));
    }
  });

  /* ---------- 返回公众号：微信内直接跳转，否则弹出二维码扫码 ---------- */
  var qrOverlay = document.getElementById('qr-overlay');
  var qrImg = document.getElementById('qr-img');
  var qrPlaceholder = document.getElementById('qr-placeholder');

  if(QR_DATA_URI && QR_DATA_URI.indexOf('data:image') === 0 && QR_DATA_URI.indexOf('__QR_BASE64__') === -1){
    qrImg.src = QR_DATA_URI;
    qrImg.style.display = 'block';
    qrPlaceholder.style.display = 'none';
  } else {
    qrImg.style.display = 'none';
    qrPlaceholder.style.display = 'flex';
  }

  function openQrModal(){
    qrOverlay.classList.add('show');
    document.addEventListener('keydown', onQrKeydown);
  }
  function closeQrModal(){
    qrOverlay.classList.remove('show');
    document.removeEventListener('keydown', onQrKeydown);
  }
  function onQrKeydown(e){ if(e.key === 'Escape') closeQrModal(); }

  document.getElementById('btn-back').addEventListener('click', function(){
    if(isWeChatBrowser()){
      window.location.href = WECHAT_URL;
    } else {
      openQrModal();
    }
  });
  document.getElementById('qr-close').addEventListener('click', closeQrModal);
  qrOverlay.addEventListener('click', function(e){
    if(e.target === qrOverlay) closeQrModal();
  });

  document.getElementById('lang-switch').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-lang]');
    if(!btn) return;
    var newLang = btn.getAttribute('data-lang');
    if(newLang === LANG) return;
    LANG = newLang;
    applyStaticI18n();
    renderQuestion();
    if(state.resultComputed && elResult.classList.contains('active')){
      computeAndShowResult();
    }
  });

  // 初始化
  applyStaticI18n();
  renderQuestion();
})();
</script>
